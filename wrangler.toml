name = "rewardtrackr"
main = "workers/worker.js"
compatibility_date = "2025-03-21"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = false

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "be4396d2374d4fbb9ae1f782179f9fe5"

[[kv_namespaces]]
binding = "STATS"
id = "38cbf75598354271b35cecd1fba305cb"

# Secret required for the /share endpoint: set via CLI, never commit it:
# wrangler secret put GITHUB_TOKEN

[env.dev]
# Inherit top-level settings and deploy with:
# npx wrangler deploy --env dev
name = "rewardtrackr-dev"
routes = [
	{ pattern = "dev.rewardtrackr.com/*", zone_name = "rewardtrackr.com" }
]
